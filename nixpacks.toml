[phases.setup]
nixPkgs = ["python3", "gcc"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  "source /opt/venv/bin/activate && pip install --no-cache-dir --upgrade pip",
  "source /opt/venv/bin/activate && pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu",
  "source /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = []

[start]
cmd = "source /opt/venv/bin/activate && uvicorn api.server:app --host 0.0.0.0 --port $PORT"

